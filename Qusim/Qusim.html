<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Qusim: simulador cuántico</title>
<style>
body { font-size: 18px; font-family: monospace; padding: 20px; }
button, select { margin: 5px; font-size: 18px;}
table { border-collapse: collapse; margin-top: 15px; }
td, th { border: 1px solid #999; padding: 4px 8px; }
canvas { margin: 10px; border: 1px solid #aaa; }
.bloch-container { display: flex; flex-wrap: wrap; }
</style>
</head>
<body>

<h2>Qusim: simulador cuántico</h2>

<label>Cúbits:</label>
<select id="numQubits" onchange="init()">
  <option>1</option>
  <option selected>2</option>
  <option>3</option>
  <option>4</option>
</select>

<br>

<button onclick="resetState()">Reset |00...0⟩</button><br>
<!--- <button onclick="applyHAll()">H a 0</button><br> --->
<!--- <button onclick="applyCNOT01()">CNOT (0→1)</button> --->
<!--- <button onclick="measureQubit0()">Medir qbit 0</button> --->
<label>Medir cúbit:</label>
<select id="measureSelect"></select>
<button onclick="measureSelected()">Medir</button><br>

<label>CNOT control:</label>
<select id="controlSelect"></select>

<label>target:</label>
<select id="targetSelect"></select>

<button onclick="applyCNOTSelected()">Aplicar CNOT</button><br>

<label>Aplicar H al cúbit:</label>
<select id="hSelect"></select>
<button title="Giro 180º en eje X (rojo) + Z (azul)"onclick="applyHSelected()">Aplicar H</button><br>

<label>Aplicar X/NOT/⨁ al cúbit:</label>
<select id="xQubitSelect"></select>
<button title="Giro 180º en eje X (rojo)" onclick="applyX()">Aplicar X</button>

<h3>Esferas de Bloch</h3>
<div id="blochSpheres" class="bloch-container"></div>

<h3>Amplitudes</h3>
<div id="amplitudes"></div>

<script>
class QState {
  constructor(n) {
    this.n = n;
    this.dim = 1 << n;
    this.re = new Float64Array(this.dim);
    this.im = new Float64Array(this.dim);
    this.re[0] = 1;
  }
}

let state;

function init() {
  const n = parseInt(document.getElementById("numQubits").value);
  state = new QState(n);
  createBlochCanvases(n);
  populateMeasureSelector(n);
  populateCNOTSelectors(n);
  populateHSelector(n); 
  populateXSelector(n);  
  render();
}

function resetState() { init(); }

function applyH(state, target) {
  const step = 1 << target;
  const inv = 1 / Math.sqrt(2);

  for (let i = 0; i < state.dim; i++) {
    if ((i & step) === 0) {
      const j = i | step;

      const ar = state.re[i];
      const ai = state.im[i];
      const br = state.re[j];
      const bi = state.im[j];

      state.re[i] = (ar + br) * inv;
      state.im[i] = (ai + bi) * inv;
      state.re[j] = (ar - br) * inv;
      state.im[j] = (ai - bi) * inv;
    }
  }
}

function applyHAll() {
  //for (let q = 0; q < state.n; q++) applyH(state, q);
  applyH(state, 0);
  render();
}

function applyCNOT(state, control, target) {
  const c = 1 << control;
  const t = 1 << target;

  for (let i = 0; i < state.dim; i++) {
    if ((i & c) && !(i & t)) {
      const j = i | t;
      [state.re[i], state.re[j]] = [state.re[j], state.re[i]];
      [state.im[i], state.im[j]] = [state.im[j], state.im[i]];
    }
  }
}

function applyCNOT01() {
  if (state.n < 2) return;
  applyCNOT(state, 0, 1);
  render();
}

function render() {
  renderAmplitudes();
  renderBloch();
}

function renderAmplitudes() {
  let html = "<table><tr><th>Estado</th><th>Re</th><th>Im</th><th>|α|²</th></tr>";

  for (let i = 0; i < state.dim; i++) {
    const bin = i.toString(2).padStart(state.n, "0");
    const prob = state.re[i]**2 + state.im[i]**2;

    html += `<tr>
      <td>|${bin}⟩</td>
      <td>${state.re[i].toFixed(3)}</td>
      <td>${state.im[i].toFixed(3)}</td>
      <td>${prob.toFixed(3)}</td>
    </tr>`;
  }

  html += "</table>";
  document.getElementById("amplitudes").innerHTML = html;
}

function createBlochCanvases(n) {
  const container = document.getElementById("blochSpheres");
  container.innerHTML = "";
  for (let i = n-1; i >= 0; i--) {
    const canvas = document.createElement("canvas");
    canvas.width = 200;
    canvas.height = 200;
    canvas.id = "bloch" + i;
    container.appendChild(canvas);
  }
}

function computeBlochVector(qubit) {
  let rho00 = 0, rho11 = 0;
  let rho01_re = 0, rho01_im = 0;

  for (let i = 0; i < state.dim; i++) {
    for (let j = 0; j < state.dim; j++) {
      const mask = ~(1 << qubit);
      if ((i & mask) === (j & mask)) {
        const bi = (i >> qubit) & 1;
        const bj = (j >> qubit) & 1;

        const ar = state.re[i];
        const ai = state.im[i];
        const br = state.re[j];
        const bi_im = state.im[j];

        const re = ar*br + ai*bi_im;
        const im = ai*br - ar*bi_im;

        if (bi === 0 && bj === 0) rho00 += re;
        if (bi === 1 && bj === 1) rho11 += re;
        if (bi === 0 && bj === 1) {
          rho01_re += re;
          rho01_im += im;
        }
      }
    }
  }

  const x = 2 * rho01_re;
  const y = 2 * rho01_im;
  const z = rho00 - rho11;

  return {x, y, z};
}

function renderBloch() {
  for (let q = 0; q < state.n; q++) {
    renderBlochSingle(q);
  }
}

function measureQubit(qbit) {

  const bit = 1 << qbit;

  let p0 = 0, p1 = 0;

  for (let i = 0; i < state.dim; i++) {
    const prob = state.re[i]**2 + state.im[i]**2;
    if ((i & bit) === 0) p0 += prob;
    else p1 += prob;
  }

  const r = Math.random();
  const result = (r < p0) ? 0 : 1;

  // Guardar vectores iniciales de TODOS los qubits
  const oldVecs = [];
  for (let q = 0; q < state.n; q++) {
    oldVecs.push(computeBlochVector(q));
  }

  // Crear copia temporal del estado para simular el colapso
  const tempState = {
    n: state.n,
    dim: state.dim,
    re: state.re.slice(),
    im: state.im.slice()
  };

  // Aplicar colapso en la copia
  for (let i = 0; i < tempState.dim; i++) {
    const isOne = (i & bit) !== 0;
    if ((result === 0 && isOne) ||
        (result === 1 && !isOne)) {
      tempState.re[i] = 0;
      tempState.im[i] = 0;
    }
  }

  const norm = Math.sqrt(result === 0 ? p0 : p1);
  for (let i = 0; i < tempState.dim; i++) {
    tempState.re[i] /= norm;
    tempState.im[i] /= norm;
  }

  // Calcular vectores finales tras colapso
  const newVecs = [];
  const backupState = state;
  state = tempState;
  for (let q = 0; q < tempState.n; q++) {
    newVecs.push(computeBlochVector(q));
  }
  state = backupState;

  // Animación simultánea
  const duration = 600; // 600
  const start = performance.now();

  function frame(now) {
    const t = Math.min((now - start) / duration, 1);

    for (let q = 0; q < state.n; q++) {

      const ov = oldVecs[q];
      const nv = newVecs[q];

      // Interpolación vectorial (incluye estiramiento)
      const x = ov.x + (nv.x - ov.x) * t;
      const y = ov.y + (nv.y - ov.y) * t;
      const z = ov.z + (nv.z - ov.z) * t;

      renderBlochSingle(q, {x,y,z});
    }

    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      // Aplicar colapso real al estado global
      state = tempState;
      render();
      alert(`Resultado medición cúbit ${qbit}: ${result}`);
    }
  }

  requestAnimationFrame(frame);
}

function measureSelected() {
  const q = parseInt(document.getElementById("measureSelect").value);
  measureQubit(q);
}

function populateMeasureSelector(n) {
  const sel = document.getElementById("measureSelect");
  sel.innerHTML = "";
  for (let i = 0; i < n; i++) {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = i;
    sel.appendChild(opt);
  }
}

function populateCNOTSelectors(n) {
  const control = document.getElementById("controlSelect");
  const target = document.getElementById("targetSelect");

  control.innerHTML = "";
  target.innerHTML = "";

  for (let i = 0; i < n; i++) {
    const opt1 = document.createElement("option");
    opt1.value = i;
    opt1.textContent = i;
    control.appendChild(opt1);

    const opt2 = document.createElement("option");
    opt2.value = i;
    opt2.textContent = i;
    target.appendChild(opt2);
  }

  //if (n > 1) target.value = 0;  // valor por defecto razonable
  if (n > 1) control.value = 1;
}


function applyCNOTSelected() {
  const c = parseInt(document.getElementById("controlSelect").value);
  const t = parseInt(document.getElementById("targetSelect").value);

  if (c === t) return;

  const oldC = computeBlochVector(c);
  const oldT = computeBlochVector(t);

  applyCNOT(state, c, t);

  const newC = computeBlochVector(c);
  const newT = computeBlochVector(t);

  renderAmplitudes();

  animateBlochTransition(c, oldC, newC);
  animateBlochTransition(t, oldT, newT);
}

function populateHSelector(n) {
  const sel = document.getElementById("hSelect");
  sel.innerHTML = "";

  for (let i = 0; i < n; i++) {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = i;
    sel.appendChild(opt);
  }
}

function populateXSelector(n) {
  const sel = document.getElementById("xQubitSelect");
  sel.innerHTML = "";

  for (let i = 0; i < n; i++) {
    const opt = document.createElement("option");
    opt.value = i;
    opt.textContent = i;
    sel.appendChild(opt);
  }
}


function applyHSelected() {
  const q = parseInt(document.getElementById("hSelect").value);

  const oldVec = computeBlochVector(q);

  applyH(state, q);          // actualiza el estado global

  renderAmplitudes();        // mostramos nuevas amplitudes inmediatamente

  animateHadamard(q, oldVec, 600);   // animación física real
}

function animateBlochTransition(q, oldVec, newVec, duration = 300) {

  const start = performance.now();

  function frame(now) {
    const t = Math.min((now - start) / duration, 1);

    // interpolación lineal
    const x = oldVec.x + (newVec.x - oldVec.x) * t;
    const y = oldVec.y + (newVec.y - oldVec.y) * t;
    const z = oldVec.z + (newVec.z - oldVec.z) * t;

    renderBlochSingle(q, {x,y,z});

    if (t < 1) requestAnimationFrame(frame);
    else render(); // al final render normal
  }

  requestAnimationFrame(frame);
}


function renderBlochSingle(q, overrideVector = null) {

  const canvas = document.getElementById("bloch" + q);
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0,0,200,200);
  
  // etiqueta del qubit
ctx.fillStyle = "black";
ctx.font = "20px sans-serif";
ctx.textAlign = "center";
ctx.fillText("q" + toSubscript(q), 180, 20);

  const cx = 100, cy = 100, R = 70;
  const tilt = 0.4;

  function project(x,y,z){
    return {
      x: cx + y*R - x*R*tilt,
      y: cy - z*R + x*R*tilt
    };
  }

  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, 2*Math.PI);
  ctx.stroke();

  const vec = overrideVector || computeBlochVector(q);
  const {x,y,z} = vec;

  drawAxis(0,0,1,"#0000cc","0","1");
  drawAxis(0,1,0,"#00aa00","i","-i");
  drawAxis(1,0,0,"#cc0000","+","-");

  ctx.strokeStyle = "black";
  ctx.lineWidth = 3;
  ctx.setLineDash(x < 0 ? [6,6] : []);

  const p = project(x,y,z);

  ctx.beginPath();
  ctx.moveTo(cx,cy);
  ctx.lineTo(p.x,p.y);
  ctx.stroke();

  ctx.setLineDash([]);
  ctx.lineWidth = 1;

  function drawAxis(ax,ay,az,color,labelPos,labelNeg){
    const pNeg = project(-ax,-ay,-az);
    const pPos = project(ax,ay,az);

    ctx.strokeStyle = color;
    ctx.fillStyle = color;
    ctx.font = "14px monospace";

    if(ax===1 && ay===0 && az===0){
      ctx.setLineDash([5,5]);
      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.lineTo(pNeg.x,pNeg.y);
      ctx.stroke();

      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(cx,cy);
      ctx.lineTo(pPos.x,pPos.y);
      ctx.stroke();
    } else {
      ctx.setLineDash([]);
      ctx.beginPath();
      ctx.moveTo(pNeg.x,pNeg.y);
      ctx.lineTo(pPos.x,pPos.y);
      ctx.stroke();
    }

    
  if (ax === 1 && ay === 0 && az === 0) {
    ctx.fillText(labelPos, pPos.x + 14, pPos.y + 6);
    ctx.fillText(labelNeg, pNeg.x + 14, pNeg.y + 6);
  } else{
	ctx.fillText(labelPos, pPos.x + 14, pPos.y - 4);
	ctx.fillText(labelNeg, pNeg.x + 14, pNeg.y - 4);
  }
    
    
  }
}


function applyX() {

  const q = parseInt(document.getElementById("xQubitSelect").value);
  const bit = 1 << q;

  const oldVec = computeBlochVector(q);

  // Aplicar X (intercambiar amplitudes |0> <-> |1> en ese qubit)
  for (let i = 0; i < state.dim; i++) {

    if ((i & bit) === 0) {
      const j = i | bit;

      // swap complejos
      [state.re[i], state.re[j]] = [state.re[j], state.re[i]];
      [state.im[i], state.im[j]] = [state.im[j], state.im[i]];
    }
  }

  const newVec = computeBlochVector(q);

  animateRotationX(q, oldVec, newVec, 500);
}

function animateRotationX(q, oldVec, newVec, duration){

  const start = performance.now();

  function frame(now){
    const t = Math.min((now - start)/duration, 1);

    const angle = Math.PI * t; // 180°

    const x = oldVec.x;
    const y = oldVec.y * Math.cos(angle) - oldVec.z * Math.sin(angle);
    const z = oldVec.y * Math.sin(angle) + oldVec.z * Math.cos(angle);

    renderBlochSingle(q, {x,y,z});

    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      render();
    }
  }

  requestAnimationFrame(frame);
}

function animateHadamard(q, oldVec, duration){

  const start = performance.now();

  // eje normalizado (X+Z)/√2
  const ux = 1/Math.sqrt(2);
  const uy = 0;
  const uz = 1/Math.sqrt(2);

  function frame(now){

    const t = Math.min((now - start)/duration, 1);
    const angle = Math.PI * t;   // rotación total π

    const cos = Math.cos(angle);
    const sin = Math.sin(angle);

    const vx = oldVec.x;
    const vy = oldVec.y;
    const vz = oldVec.z;

    // Producto escalar u·v
    const dot = ux*vx + uy*vy + uz*vz;

    // Fórmula de Rodrigues
    const x =
      vx*cos +
      (uy*vz - uz*vy)*sin +
      ux*dot*(1-cos);

    const y =
      vy*cos +
      (uz*vx - ux*vz)*sin +
      uy*dot*(1-cos);

    const z =
      vz*cos +
      (ux*vy - uy*vx)*sin +
      uz*dot*(1-cos);

    renderBlochSingle(q, {x,y,z});

    if (t < 1) {
      requestAnimationFrame(frame);
    } else {
      render();
    }
  }

  requestAnimationFrame(frame);
}

function toSubscript(n) {
  const sub = "₀₁₂₃₄₅₆₇₈₉";
  return String(n).split("").map(d => sub[d]).join("");
}

init();
</script>

</body>
</html>
